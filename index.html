<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inggrisku - Platform Belajar Bahasa Inggris AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>

    <header class="app-header">
        <div class="header-container">
            <h1 class="logo">Inggris<span>ku</span></h1>
            <div class="user-badge">
                <span class="streak-fire">🔥 3 Days</span>
            </div>
        </div>
    </header>

    <main id="app-content" class="main-content">
        </main>

    <nav class="bottom-nav">
        <button class="nav-item active" data-page="home">
            <span class="nav-icon">🏠</span>
            <span class="nav-label">Beranda</span>
        </button>
        <button class="nav-item" data-page="progress">
            <span class="nav-icon">📊</span>
            <span class="nav-label">Progress</span>
        </button>
        <button class="nav-item" data-page="settings">
            <span class="nav-icon">⚙️</span>
            <span class="nav-label">Settings</span>
        </button>
    </nav>

    <script src="scripts/app.js" type="module"></script>

</html>
